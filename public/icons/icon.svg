<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#1a2563"/>
      <stop offset="1" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe080"/>
      <stop offset="0.55" stop-color="#ffd54a"/>
      <stop offset="1" stop-color="#ff9d3d"/>
    </linearGradient>
    <linearGradient id="foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3b0"/>
      <stop offset="1" stop-color="#ffe080"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund (volles Quadrat, damit „maskable“ funktioniert) -->
  <rect width="512" height="512" fill="#050816"/>
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Schaum-Tropfen oben für Pub-Vibe -->
  <circle cx="158" cy="92"  r="22" fill="url(#foam)"/>
  <circle cx="218" cy="70"  r="16" fill="url(#foam)"/>
  <circle cx="270" cy="92"  r="20" fill="url(#foam)"/>
  <circle cx="330" cy="68"  r="14" fill="url(#foam)"/>
  <circle cx="378" cy="98"  r="18" fill="url(#foam)"/>

  <!-- Großes Fragezeichen, mittig in der Safe-Zone -->
  <text x="256" y="395" font-size="380" text-anchor="middle"
        font-family="Impact, 'Arial Black', sans-serif" font-weight="900"
        fill="url(#gold)" stroke="#08102e" stroke-width="6" paint-order="stroke">?</text>
</svg>
